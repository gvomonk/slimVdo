<svg width="1024" height="1024" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#EFF2F6" />
    </radialGradient>
    <linearGradient id="play-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF5E62" />
      <stop offset="100%" stop-color="#FF9966" />
    </linearGradient>
    <linearGradient id="squeeze-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="50%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    
    <!-- Soft, elegant drop shadow for modern 3D depth (Uses userSpaceOnUse to prevent clipping) -->
    <filter id="soft-shadow" filterUnits="userSpaceOnUse" x="0" y="0" width="200" height="200">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    
    <!-- Outer glow for neon tech vibe -->
    <filter id="glow-shadow" filterUnits="userSpaceOnUse" x="0" y="0" width="200" height="200">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#FF5E62" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Clean Borderless Circular Background -->
  <circle cx="100" cy="100" r="100" fill="url(#bg-grad)"/>

  <!-- Left Squeeze Curve (Borderless Gradient) -->
  <path d="M 56 55 C 72 85, 72 115, 56 145" fill="none" stroke="url(#squeeze-grad)" stroke-width="12" stroke-linecap="round" filter="url(#soft-shadow)"/>

  <!-- Right Squeeze Curve (Borderless Gradient) -->
  <path d="M 144 55 C 128 85, 128 115, 144 145" fill="none" stroke="url(#squeeze-grad)" stroke-width="12" stroke-linecap="round" filter="url(#soft-shadow)"/>

  <!-- Play Button (Borderless Glow Gradient) -->
  <path d="M 86 82 L 114 100 L 86 118 Z" fill="url(#play-grad)" stroke="url(#play-grad)" stroke-width="10" stroke-linejoin="round" stroke-linecap="round" filter="url(#glow-shadow)"/>

  <!-- Cute Star Sparkles 1 -->
  <path d="M 127 62 Q 132 62 132 57 Q 132 62 137 62 Q 132 62 132 67 Q 132 62 127 62 Z" fill="#FACC15" filter="url(#soft-shadow)"/>
  <!-- Cute Star Sparkles 2 -->
  <path d="M 63 138 Q 68 138 68 133 Q 68 138 73 138 Q 68 138 68 143 Q 68 138 63 138 Z" fill="#FACC15" filter="url(#soft-shadow)"/>
</svg>
